<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JEKI MALYI Model Agency</title>

<style>
:root{
  --blue-soft:#3b8cff;
  --black:#050816;
  --navy:#070b1c;
  --navy2:#040611;
  --white:#fff;
  --silver:#cfd6e6;
  --muted:#a9b4cc;
  --muted2:#7d889f;
  --border:rgba(26,107,255,0.18);
  --r:16px;
  --r2:10px;
  --transition:.25s ease;
}

/* ===== BACKGROUND GLOW ===== */
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--black);
  color:var(--white);
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(26,107,255,0.14), transparent 45%),
    radial-gradient(circle at 80% 60%, rgba(26,107,255,0.10), transparent 50%);
  pointer-events:none;
}

/* ===== NEON TEXT ===== */
.hero-title,.cta-title,.st,.nav-name{
  text-shadow:0 0 18px rgba(26,107,255,0.35);
}

/* ===== BUTTONS BRIGHT ===== */
.btn{
  display:inline-flex;
  gap:8px;
  align-items:center;
  padding:12px 22px;
  border-radius:50px;
  text-decoration:none;
  transition:.25s;
}

.btn-p{
  background:linear-gradient(135deg,#1a6bff,#4aa3ff);
  color:#fff;
  box-shadow:0 0 30px rgba(26,107,255,0.35);
}

.btn-p:hover{
  transform:translateY(-2px);
  box-shadow:0 0 55px rgba(26,107,255,0.6);
}

/* ===== NAV ===== */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:18px 32px;
  background:rgba(5,8,22,0.6);
  backdrop-filter:blur(14px);
  z-index:10;
}

.nav-links{
  display:flex;
  gap:16px;
  list-style:none;
}

.nav-links a{
  color:var(--silver);
  text-decoration:none;
}

.nav-links a:hover{
  color:var(--blue-soft);
}

/* ===== GEO FIX ===== */
.geo-wide{
  grid-column:span 3;
}
@media(max-width:1020px){.geo-wide{grid-column:span 2;}}
@media(max-width:680px){.geo-wide{grid-column:span 1;}}

/* ===== QUIZ ===== */
.qopt{
  padding:10px 16px;
  border:1px solid rgba(26,107,255,0.25);
  background:rgba(26,107,255,0.08);
  cursor:pointer;
}
.qopt.sel{
  background:rgba(26,107,255,0.25);
  box-shadow:0 0 14px rgba(26,107,255,0.35);
}

/* ===== FOOTER ===== */
footer{
  background:var(--navy2);
  padding:60px 0;
}
</style>
</head>

<body>

<!-- NAV -->
<nav id="mainNav">
  <div class="nav-name nav-jm">JEKI MALYI</div>

  <ul class="nav-links">
    <li><a href="#hero">Главная</a></li>
    <li><a href="#about">О нас</a></li>
    <li><a href="#services">Услуги</a></li>
    <li><a href="#results">Результаты</a></li>
    <li><a href="#faq">FAQ</a></li>
  </ul>

  <!-- ONLY TOP LANG SWITCH -->
  <div>
    <button onclick="setLang('ru')">RU</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('ua')">UA</button>
    <button onclick="setLang('de')">DE</button>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <h1 class="hero-title"
      data-ru="Твой контент. Наша стратегия. Твой рост."
      data-en="Your content. Our strategy. Your growth."
      data-ua="Твій контент. Наша стратегія. Твій ріст."
      data-de="Dein Content. Unsere Strategie. Dein Wachstum.">
    Твой контент. Наша стратегия. Твой рост.
  </h1>

  <p class="hero-desc"
     data-ru="Рост моделей по всему миру"
     data-en="Global model growth agency"
     data-ua="Ріст моделей у всьому світі"
     data-de="Globales Model-Wachstum">
    Рост моделей по всему миру
  </p>
</section>

<!-- GEO FIXED -->
<section id="geo">
  <div class="geo-grid">
    <div class="geo-card">🇪🇺 Европа</div>
    <div class="geo-card">🇬🇧 UK</div>
    <div class="geo-card">🇺🇸 USA</div>

    <!-- FIXED BIG CARD -->
    <div class="geo-card geo-wide">🌍 Worldwide Operation</div>
  </div>
</section>

<!-- SCRIPTS -->
<script>
var currentLang='ru';

function setLang(lang){
  currentLang=lang;

  document.querySelectorAll('[data-ru]').forEach(function(el){
    var key='data-'+lang;
    if(el.getAttribute(key)){
      el.innerText=el.getAttribute(key);
    }
  });
}

/* FAQ */
function faqToggle(btn){
  var item=btn.closest('.faq-item');
  item.classList.
     toggle('open');
}

/* QUIZ */
function qNext(step,el){
  el.classList.add('sel');
}
</script>

</body>
</html>
